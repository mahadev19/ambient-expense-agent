rules:
  - id: hardcoded-google-api-key
    patterns:
      - pattern-regex: AIzaSy[A-Za-z0-9_\-]+
    message: >
      Hardcoded Google API key detected (matched prefix 'AIzaSy...').
      Embedding credentials directly in source code is a critical security
      vulnerability — the key will be exposed in version control history and
      any downstream artifact (Docker images, logs, etc.).
      Remediation: remove the key from source, load it at runtime from an
      environment variable (e.g. os.environ["GOOGLE_API_KEY"]) or from
      Google Cloud Secret Manager, and rotate the exposed key immediately.
    languages:
      - python
    severity: ERROR
    metadata:
      category: security
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
        - "CWE-312: Cleartext Storage of Sensitive Information"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - vuln
      references:
        - https://cloud.google.com/docs/authentication/api-keys#securing
        - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
